
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pet-manager-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/petmanager
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=changeme
      # Add other env vars here or use env_file
    depends_on:
      - postgres
    networks:
      - pet-manager-network

  postgres:
    image: postgres:15-alpine
    container_name: pet-manager-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=petmanager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - pet-manager-network

networks:
  pet-manager-network:
    driver: bridge

volumes:
  pgdata:
