
services:
  db-migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: pet-manager-migrator
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/petmanager
    command: npm run db:push
    depends_on:
      postgres:
        condition: service_started
    networks:
      - pet-manager-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pet-manager-app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/petmanager
      - AUTH_URL=http://localhost:3000
      - AUTH_SECRET=changeme
      - AUTH_TRUST_HOST=true
      # Add other env vars here or use env_file
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_started
    networks:
      - pet-manager-network

  postgres:
    image: postgres:15-alpine
    container_name: pet-manager-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=petmanager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - pet-manager-network

networks:
  pet-manager-network:
    driver: bridge

volumes:
  pgdata:
