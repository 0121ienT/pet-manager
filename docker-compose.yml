services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    image: pet-manager-migrator:local
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-petmanager}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pet-manager-network
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: pet-manager-app:local
    container_name: pet-manager-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3002}:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-petmanager}"
      AUTH_SECRET: ${AUTH_SECRET:-docker-dev-secret-key-change-in-production}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3002}
      NODE_ENV: production
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:3002}
      OPENROUTER_SITE_NAME: ${OPENROUTER_SITE_NAME:-Pet Manager}
      OPENROUTER_MODEL_ROADMAP: ${OPENROUTER_MODEL_ROADMAP:-openai/gpt-4o-mini}
      OPENROUTER_MODEL_QUIZ: ${OPENROUTER_MODEL_QUIZ:-openai/gpt-4o-mini}
      OPENROUTER_MODEL_FLASHCARDS: ${OPENROUTER_MODEL_FLASHCARDS:-google/gemini-2.5-flash-lite}
      REDIS_URL: "redis://redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - pet-manager-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: pet-manager-worker:local
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-petmanager}"
      REDIS_URL: "redis://redis:6379"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:3002}
      OPENROUTER_SITE_NAME: ${OPENROUTER_SITE_NAME:-Pet Manager}
      OPENROUTER_MODEL_ROADMAP: ${OPENROUTER_MODEL_ROADMAP:-openai/gpt-4o-mini}
      OPENROUTER_MODEL_QUIZ: ${OPENROUTER_MODEL_QUIZ:-openai/gpt-4o-mini}
      OPENROUTER_MODEL_FLASHCARDS: ${OPENROUTER_MODEL_FLASHCARDS:-google/gemini-2.5-flash-lite}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      AUTH_SECRET: ${AUTH_SECRET:-docker-dev-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pet-manager-network
    healthcheck:
      # The worker has no HTTP port; verify the node process is alive and the
      # bundle file exists (cheap, runs inside the container).
      test: ["CMD-SHELL", "pgrep -f worker.cjs >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: pet-manager-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - pet-manager-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: pet-manager-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-petmanager}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-petmanager}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pet-manager-network

networks:
  pet-manager-network:
    driver: bridge

volumes:
  pgdata:
    name: pet-manager-pgdata
